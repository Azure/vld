[Options]

VLD = on

AggregateDuplicates = no

ForceIncludeModules =

MaxDataDump =

MaxTraceFrames =

ReportEncoding = ascii

ReportFile =

ReportTo = debugger

SelfTest = off

StackWalkMethod = fast

StartDisabled = no

TraceInternalFrames = no

SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

IgnoreFunctionsList =

; Exclude the test DLL from leak detection. Any allocation whose call stack
; originates from ignore_modules_dll.dll will be suppressed.
IgnoreModulesList = ignore_modules_dll.dll
