[Options]

VLD = on

AggregateDuplicates = no

ForceIncludeModules =

MaxDataDump =

MaxTraceFrames =

ReportEncoding = ascii

ReportFile =

ReportTo = debugger

SelfTest = off

StackWalkMethod = fast

StartDisabled = no

TraceInternalFrames = no

SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

IgnoreFunctionsList =

; Suppress false positives from system DLLs loaded during getaddrinfo.
;
; During the first call to getaddrinfo, the Winsock layer dynamically loads
; several namespace provider DLLs via LoadLibraryExA. These DLLs allocate
; memory during initialization that persists for the process lifetime and is
; cleaned up by the OS at process exit. These are false positives for VLD.
;
; The specific DLLs that leak depend on the OS version and installed network
; providers:
;   - rasadhlp.dll: Remote Access Service Address Helper (common on CI agents)
;   - dnsapi.dll: DNS Client API (internal DLL init allocations)
;   - mswsock.dll: Microsoft Windows Sockets Helper (Winsock provider)
;   - fwpuclnt.dll: Windows Filtering Platform (firewall/network policy)
;
; Their internal functions are unexported and unresolvable without PDBs, so
; IgnoreFunctionsList cannot target them. IgnoreModulesList is the only
; reliable suppression strategy.
IgnoreModulesList = rasadhlp.dll;dnsapi.dll;mswsock.dll;fwpuclnt.dll
