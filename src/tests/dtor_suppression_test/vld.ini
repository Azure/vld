;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;
;;  Visual Leak Detector - Initialization/Configuration File (test config)
;;
;;  Config for dtor_suppression_test: lists LeakInIgnoredHelper in
;;  IgnoreFunctionsList and directs VLD's report to stdout so CTest can
;;  assert on it via PASS_REGULAR_EXPRESSION.
;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[Options]
VLD = on
AggregateDuplicates = no
ForceIncludeModules = *
MaxDataDump =
MaxTraceFrames =
ReportEncoding = ascii
ReportFile =
ReportTo = stdout
SelfTest = off
StackWalkMethod = fast
StartDisabled = no
TraceInternalFrames = no
SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

IgnoreFunctionsList = LeakInIgnoredHelper

IgnoreModulesList =
