[Options]

VLD = on

AggregateDuplicates = no

ForceIncludeModules = *

MaxDataDump =

MaxTraceFrames =

ReportEncoding = ascii

ReportFile =

ReportTo = debugger

SelfTest = off

StackWalkMethod = fast

StartDisabled = no

TraceInternalFrames = no

SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes
; This test exercises the always-stack-walk attribution of CRT/system-routed
; allocations, so it explicitly opts in (the product default is the 2.5.10
; immediate-caller behavior).
ReportSystemAllocations = yes

IgnoreFunctionsList =

; No IgnoreModulesList. This test intentionally leaves it empty so that
; system DLL leaks from getaddrinfo are reported. This proves that the
; leaks exist and that IgnoreModulesList in the companion test
; (ignore_modules_getaddrinfo_test) is doing real work.
IgnoreModulesList =
