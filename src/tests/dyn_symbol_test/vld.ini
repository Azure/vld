;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;
;;  dyn_symbol_test vld.ini
;;
;;  Verifies that symbols for dynamically loaded DLLs are resolved by dbghelp
;;  on ARM64 (cluster B regression test). ReportTo=stdout so CTest regex can
;;  inspect the leak report.
;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[Options]
VLD = on
AggregateDuplicates = no
ForceIncludeModules = *
MaxDataDump = 0
MaxTraceFrames =
ReportEncoding = ascii
ReportFile =
ReportTo = stdout
SelfTest = off
StackWalkMethod = fast
StartDisabled = no
TraceInternalFrames = no
SkipHeapFreeLeaks = no

SkipCrtStartupLeaks = yes

IgnoreFunctionsList =

IgnoreModulesList =
