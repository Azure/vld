name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)
resources:
- repo: self
  clean: true

parameters:
- name: architectures
  type: object
  default:
    - name: 'x64'
      jobName: 'x64_v5'
      pool: 'Azure-MessagingStore-WinBuildPoolVS2022_1'
    - name: 'x64'
      jobName: 'x64_v6'
      pool: 'Azure-MessagingStore-Win-x64-Dadsv6-v01'
    - name: 'x86'
      jobName: 'x86_v5'
      pool: 'Azure-MessagingStore-WinBuildPoolVS2022_1'
    - name: 'x86'
      jobName: 'x86_v6'
      pool: 'Azure-MessagingStore-Win-x64-Dadsv6-v01'
    - name: 'arm64'
      jobName: 'arm64_ampere'
      pool: 'Azure-MessagingStore-WinBuildPoolARM'
    - name: 'arm64'
      jobName: 'arm64_cobalt'
      pool: 'Azure-MessagingStore-Win-ARM64-Dpldsv6-v01'

- name: configurations
  type: object
  default:
    - 'Debug'
    - 'RelWithDebInfo'

jobs:
- ${{ each arch in parameters.architectures }}:
  - ${{ each config in parameters.configurations }}:
    - job: Build_${{ arch.jobName }}_${{ config }}
      displayName: 'Build ${{ arch.jobName }} ${{ config }}'
      pool:
        name: ${{ arch.pool }}
        demands:
        - Cmd
        - msbuild
        - visualstudio
        - Build
      steps:
      - checkout: self
      - template: templates/build-arch.yml
        parameters:
          arch: ${{ arch.name }}
          configuration: ${{ config }}
          runTests: true
          artifactSuffix: '_${{ arch.jobName }}-${{ config }}'
